<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#070A22" />
  <title>Space Cat Food Catcher 13</title>
  <link rel="stylesheet" href="style.css" />
</head>
  <body>
  <div id="game-state-marker" class="smoke-marker" aria-live="polite">State menu Score 0 Time 0 Level 1 Lives 3</div>
  <main id="app" aria-live="polite">
    <canvas id="gameCanvas" aria-label="Space animal dodge arcade"></canvas>

    <section id="menu" class="screen active panel">
      <div class="badge" data-i18n="badge">Neon Candy Space Nursery</div>
      <h1 data-i18n="title">Космический кот ловит еду</h1>
      <p class="lead" data-i18n="subtitle">Уворачивайся от бомб, собирай космо-лакомства и открывай 10 питомцев.</p>
      <div class="actions">
        <button id="playBtn" class="primary" data-i18n="play">Играть</button>
        <button id="animalsBtn" data-i18n="animals">Животные</button>
        <button id="settingsBtn" data-i18n="settings">Настройки</button>
      </div>
      <p class="hint" data-i18n="controlsHint">WASD/стрелки или перетаскивание пальцем. Space — рывок.</p>
    </section>

    <section id="select" class="screen panel">
      <h2 data-i18n="selectTitle">Выбор питомца</h2>
      <div id="cards" class="cards"></div>
      <div class="actions row">
        <button id="startBtn" class="primary" data-i18n="startRun">Старт</button>
        <button data-go="menu" data-i18n="back">Назад</button>
      </div>
    </section>

    <section id="settings" class="screen panel small">
      <h2 data-i18n="settings">Настройки</h2>
      <label class="toggle"><input id="soundToggle" type="checkbox" checked /> <span data-i18n="sound">Звук</span></label>
      <label class="toggle"><input id="motionToggle" type="checkbox" checked /> <span data-i18n="motion">Частицы и тряска</span></label>
      <label class="toggle"><input id="langToggle" type="checkbox" /> <span data-i18n="english">English UI</span></label>
      <div class="actions row"><button id="resetBtn" data-i18n="reset">Сброс прогресса</button><button data-go="menu" class="primary" data-i18n="back">Назад</button></div>
    </section>

    <section id="hud" class="hud hidden">
      <span>★ <b id="score">0</b></span><span>Lv <b id="level">1</b></span><span id="hearts">♥♥♥</span>
      <span id="combo">x1</span><span id="shield">◇0</span><button id="pauseBtn">Ⅱ</button>
      <div class="xp"><i id="xpbar"></i></div>
    </section>

    <button id="dashBtn" class="dash hidden" aria-label="Dash">⚡</button>

    <section id="pause" class="screen panel small">
      <h2 data-i18n="paused">Пауза</h2>
      <div class="actions"><button id="resumeBtn" class="primary" data-i18n="resume">Продолжить</button><button id="restartBtn" data-i18n="restart">Заново</button><button data-go="menu" data-i18n="menu">Меню</button></div>
    </section>

    <section id="result" class="screen panel small">
      <h2 id="resultTitle" data-i18n="result">Результат</h2>
      <p id="resultText" class="lead"></p>
      <div class="actions row"><button id="againBtn" class="primary" data-i18n="again">Ещё раз</button><button data-go="select" data-i18n="animals">Животные</button></div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
